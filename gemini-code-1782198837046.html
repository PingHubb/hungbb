<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unicorn Magical Diary ✦ Tokyo Honeymoon Itinerary</title>
    
    <!-- Google Fonts: Playful, Cute & Hand-drawn fonts for headings, body text, and Chinese characters -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Quicksand:wght@400;500;600;700&family=ZCOOL+KuaiLe&family=Kosugi+Maru&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            /* Palette extracted directly from the unicorn stickers */
            --unicorn-pink: #FFB7D5;
            --soft-rose: #FF9ECA;
            --magic-magenta: #FF6FA9;
            --lavender-purple: #D6C7FF;
            --glowing-purple: #B59EFF;
            --cloud-blue: #BCE7FD;
            --star-yellow: #FFF3A7;
            --mint-green: #C4FAF8;
            
            /* Theme Color Foundations */
            --text-dark: #5C4B61;
            --text-muted: #8E7A94;
            --white-sticker: #FFFFFF;
            --border-soft: #FFE3F0;
            
            /* Action States & Alerts */
            --warm-alert: #FF9B9B;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            /* Applied 'ZCOOL KuaiLe' and 'Kosugi Maru' for a bubbly, rounded cute Chinese font style */
            font-family: 'Quicksand', 'ZCOOL KuaiLe', 'Kosugi Maru', sans-serif;
            /* Magical Pastel Gradient Blend mimicking sky and rainbows */
            background: linear-gradient(135deg, #FFF0F6 0%, #EBF7FF 40%, #F3EFFF 75%, #FFF9E6 100%);
            background-attachment: fixed;
            color: var(--text-dark);
            line-height: 1.7;
            padding-bottom: 80px;
            overflow-x: hidden;
            position: relative;
        }

        /* Ambient Magical Background Lighting Effects */
        body::before {
            content: '✨';
            position: fixed;
            top: 10%;
            left: 8%;
            font-size: 3rem;
            opacity: 0.4;
            z-index: -1;
            animation: floating 4s ease-in-out infinite;
        }

        body::after {
            content: '☁️';
            position: fixed;
            bottom: 15%;
            right: 8%;
            font-size: 4rem;
            opacity: 0.3;
            z-index: -1;
            animation: floating 5s ease-in-out infinite alternate;
        }

        @keyframes floating {
            0% { transform: translateY(0px) rotate(0deg); }
            100% { transform: translateY(-15px) rotate(10deg); }
        }

        /* Whimsical Dreamy Header */
        header {
            text-align: center;
            padding: 70px 20px 30px 20px;
            position: relative;
        }

        header h1 {
            font-family: 'Caveat', 'ZCOOL KuaiLe', cursive;
            font-size: 5rem;
            font-weight: 700;
            letter-spacing: 2px;
            background: linear-gradient(135deg, var(--magic-magenta), var(--glowing-purple), #FF9800);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0px 4px 6px rgba(255, 183, 213, 0.4));
            margin-bottom: 5px;
            display: inline-block;
        }

        header p {
            font-size: 1.2rem;
            letter-spacing: 3px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        /* Scannable Layout Container */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Bubbly Ribbon Navigation */
        .day-navigation {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-bottom: 40px;
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.85);
            padding: 15px 10px;
            z-index: 100;
            border-bottom: 3px dashed var(--unicorn-pink);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 0 0 30px 30px;
            box-shadow: 0 8px 24px rgba(255, 183, 213, 0.15);
        }

        .day-btn {
            font-family: 'Quicksand', 'ZCOOL KuaiLe', sans-serif;
            background: var(--white-sticker);
            border: 2px solid var(--border-soft);
            padding: 8px 18px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--text-muted);
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.03);
        }

        .day-btn:hover {
            color: var(--magic-magenta);
            border-color: var(--unicorn-pink);
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(255, 111, 169, 0.2);
        }

        .day-btn.active {
            background: linear-gradient(135deg, var(--unicorn-pink) 0%, var(--lavender-purple) 100%);
            color: white;
            border-color: white;
            box-shadow: 0 6px 15px rgba(214, 199, 255, 0.6);
            transform: scale(1.05);
        }

        /* Timeline Grid */
        .timeline {
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
        }

        /* Bubbly Sticker Card Design */
        .card {
            background: var(--white-sticker);
            border: 3px solid #FFEBF4;
            border-radius: 24px;
            padding: 26px;
            display: grid;
            grid-template-columns: 140px 1fr auto;
            align-items: start;
            gap: 24px;
            box-shadow: 0 8px 20px rgba(92, 75, 97, 0.05);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        .card:hover {
            transform: translateY(-5px) scale(1.01);
            border-color: var(--unicorn-pink);
            box-shadow: 0 15px 30px rgba(255, 183, 213, 0.35);
        }

        /* Left Column Block: Time Framework */
        .card-time-block {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .time-badge {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-dark);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .type-tag {
            display: inline-block;
            font-size: 0.75rem;
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 12px;
            text-transform: uppercase;
            text-align: center;
            width: fit-content;
            letter-spacing: 0.5px;
        }

        /* Sticker Aura Theme Custom Colors */
        .tag-overview { background: var(--star-yellow); color: #7A6500; border: 1px solid rgba(0,0,0,0.05); }
        .tag-transport { background: var(--cloud-blue); color: #2B6180; }
        .tag-meal { background: #FFEAA7; color: #8A6D00; }
        .tag-booking { background: #FFD3E8; color: #A8386B; }
        .tag-shopping { background: #E3D8FF; color: #5B43A8; }
        .tag-activity { background: var(--mint-green); color: #237A65; }
        .tag-checkin { background: #D2F7F6; color: #1E706E; }

        /* Center Column Block */
        .card-content {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .card-header-line {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .card-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text-dark);
        }

        .location-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 0.8rem;
            background: #F4F0F6;
            padding: 3px 10px;
            border-radius: 8px;
            color: var(--text-muted);
            font-weight: 600;
        }

        .category-badge {
            display: inline-flex;
            align-items: center;
            font-size: 0.75rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--star-yellow), var(--mint-green));
            color: #4A6E56;
            padding: 2px 8px;
            border-radius: 6px;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .card-desc {
            font-size: 0.95rem;
            color: var(--text-dark);
            white-space: pre-line;
        }

        /* Weather Badge Layout styling */
        .weather-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            font-weight: 700;
            color: #7A6500;
            background: #FFFCEB;
            border: 2px solid var(--star-yellow);
            padding: 4px 14px;
            border-radius: 15px;
            width: fit-content;
            margin-bottom: 8px;
        }

        /* Cute Scrapbook Note Blocks */
        .card-notes {
            font-size: 0.88rem;
            background: #FFF5F9;
            border-left: 4px solid var(--soft-rose);
            padding: 12px 16px;
            border-radius: 4px 16px 16px 4px;
            color: #8C4869;
            margin-top: 6px;
            white-space: pre-line;
        }

        .note-warning {
            border-left-color: var(--warm-alert) !important;
            background: #FFF2F2 !important;
            color: #A34747 !important;
        }

        .note-star {
            border-left-color: #F3CD57 !important;
            background: #FFFDF0 !important;
            color: #7A621D !important;
        }

        /* Magical Booked Ribbon Design */
        .booked-ribbon {
            position: absolute;
            top: 15px;
            right: 75px;
            background: linear-gradient(135deg, var(--magic-magenta), var(--soft-rose));
            font-size: 0.7rem;
            font-weight: 700;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            letter-spacing: 1px;
            box-shadow: 0 4px 10px rgba(255, 111, 169, 0.3);
            animation: pulseGlow 2.5s infinite ease-in-out;
        }

        @keyframes pulseGlow {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); box-shadow: 0 6px 14px rgba(255, 111, 169, 0.5); }
            100% { transform: scale(1); }
        }

        /* Right Column Block: Interactive Map Action Buttons */
        .card-actions {
            display: flex;
            align-items: center;
            height: 100%;
        }

        .map-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            background: #FFF5F9;
            border: 2px solid var(--border-soft);
            border-radius: 50%;
            color: var(--magic-magenta);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none;
        }

        .map-btn:hover {
            background: linear-gradient(135deg, var(--unicorn-pink) 0%, var(--lavender-purple) 100%);
            color: white;
            border-color: white;
            transform: scale(1.15) rotate(15deg);
            box-shadow: 0 6px 12px rgba(214, 199, 255, 0.6);
        }

        /* Special Scrapbook Overview Card Display Configuration */
        .card.mode-overview {
            background: linear-gradient(135deg, #FFFFFF 0%, #FFF5FA 100%);
            border: 3px dashed var(--unicorn-pink);
            grid-template-columns: 1fr;
            text-align: center;
            padding: 30px;
        }

        .card.mode-overview .card-time-block {
            align-items: center;
        }

        .card.mode-overview .card-header-line {
            justify-content: center;
            flex-direction: column;
            gap: 4px;
        }

        .card.mode-overview .card-title {
            font-size: 2.2rem;
            font-family: 'Caveat', 'ZCOOL KuaiLe', cursive;
            letter-spacing: 1px;
            background: linear-gradient(to right, var(--magic-magenta), var(--glowing-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-top: 5px;
        }

        .card.mode-overview .card-desc {
            font-size: 1.05rem;
            color: var(--text-dark);
            font-weight: 600;
        }

        /* Responsive Optimization Rules Matrix */
        @media (max-width: 768px) {
            header h1 {
                font-size: 3.8rem;
            }
            .card {
                grid-template-columns: 1fr;
                gap: 15px;
                padding: 20px;
            }
            .booked-ribbon {
                position: relative;
                top: 0;
                right: 0;
                width: fit-content;
                margin-bottom: 5px;
            }
            .card-actions {
                justify-content: flex-end;
                border-top: 2px dashed var(--border-soft);
                padding-top: 15px;
            }
            .day-navigation {
                border-radius: 0;
                padding: 10px 5px;
            }
        }
    </style>
</head>

        // Renderer Engine Function
        function renderTimeline(data) {
            const grid = document.getElementById('timeline-grid');
            grid.innerHTML = ''; 

            data.forEach(item => {
                const card = document.createElement('div');
                card.className = `card ${item.type === 'Overview' ? 'mode-overview' : ''}`;
                
                // Whimsical Soft Icons Setup Rules
                let iconName = 'star';
                if (item.type === 'Transport') iconName = 'sparkles';
                if (item.type === 'Meal') iconName = 'coffee';
                if (item.type === 'Booking') iconName = 'heart';
                if (item.type === 'Shopping') iconName = 'gift';
                if (item.type === 'Check-in') iconName = 'moon';
                if (item.type === 'Overview') iconName = 'compass';

                const locationHtml = item.location ? `<span class="location-badge"><i data-lucide="map-pin" style="width:12px;height:12px;color:var(--magic-magenta)"></i>${item.location}</span>` : '';
                const categoryHtml = item.category ? `<span class="category-badge">${item.category}</span>` : '';
                
                let noteStyleClass = '';
                if(item.notes.includes('⚠️')) noteStyleClass = 'note-warning';
                else if(item.notes.includes('★')) noteStyleClass = 'note-star';
                const notesHtml = item.notes ? `<div class="card-notes ${noteStyleClass}">${item.notes}</div>` : '';

                const ribbonHtml = (item.notes.includes('★ 已') || item.notes.includes('★ Booked')) ? `<div class="booked-ribbon">✦ BOOKED</div>` : '';

                if (item.type === 'Overview') {
                    const weatherHtml = item.weather ? `<div class="weather-badge">✨ ${item.weather}</div>` : '';
                    
                    card.innerHTML = `
                        <div class="card-time-block">
                            <span class="type-tag tag-overview">${item.day}</span>
                        </div>
                        <div class="card-content">
                            <div class="card-header-line">
                                ${weatherHtml}
                                <h3 class="card-title">🌸 ${item.title} 🌸</h3>
                            </div>
                            <p class="card-desc">${item.desc}</p>
                        </div>
                    `;
                } else {
                    card.innerHTML = `
                        ${ribbonHtml}
                        <div class="card-time-block">
                            <span class="time-badge">
                                <i data-lucide="${iconName}" style="width: 18px; height: 18px; color: var(--magic-magenta);"></i>
                                ${item.time}
                            </span>
                            <span class="type-tag tag-${item.type.toLowerCase()}">${item.type}</span>
                        </div>
                        <div class="card-content">
                            <div class="card-header-line">
                                <h4 class="card-title">${item.title}</h4>
                                ${locationHtml}
                                ${categoryHtml}
                            </div>
                            <p class="card-desc">${item.desc}</p>
                            ${notesHtml}
                        </div>
                        <div class="card-actions">
                            <a class="map-btn" href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(item.query)}" target="_blank" title="Find Magical Trail">
                                <i data-lucide="map"></i>
                            </a>
                        </div>
                    `;
                }

                grid.appendChild(card);
            });

            lucide.createIcons();
        }

        // Filtering Control Engine Implementation
        function filterDay(targetDay) {
            const buttons = document.querySelectorAll('.day-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            
            const event = window.event;
            if(event) {
                event.target.classList.add('active');
            } else {
                buttons.forEach(btn => {
                    if(btn.getAttribute('onclick').includes(`'${targetDay}'`)) btn.classList.add('active');
                });
            }

            if (targetDay === 'all') {
                renderTimeline(itineraryData);
            } else {
                const filtered = itineraryData.filter(item => item.day === targetDay);
                renderTimeline(filtered);
            }
        }

        window.onload = function() {
            renderTimeline(itineraryData);
        };
    </script>
